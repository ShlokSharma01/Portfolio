<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shlok Sharma — Developer · Data Analyst · Designer. Full-stack engineer, AI/ML practitioner, and data analyst based in India." />
    <meta name="theme-color" content="#0B0608" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Shlok Sharma — Portfolio" />
    <meta property="og:description" content="Developer · Data Analyst · Designer" />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:type"        content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Shlok Sharma — Portfolio" />
    <meta name="twitter:description" content="Developer · Data Analyst · Designer" />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Preconnect: start TCP/TLS early for font CDNs -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Fonts loaded ASYNCHRONOUSLY to eliminate render-blocking.
      Pattern: rel="preload" as="style" → swap to stylesheet via onload.
      noscript fallback ensures fonts still load without JS.
      font-display:swap (appended by both CDNs) prevents invisible text.
    -->

    <!-- Clash Display (Fontshare) — async -->
    <link rel="preload" as="style"
      href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" />
    </noscript>

    <!-- Satoshi (Fontshare) — async -->
    <link rel="preload" as="style"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" />
    </noscript>

    <!-- JetBrains Mono (Google Fonts) — async -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
    </noscript>

    <title>Shlok Sharma — Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
